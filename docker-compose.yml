services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productcatalog-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-SqlServerDev123!}
      MSSQL_PID: Developer
    ports:
      - "${SQL_SERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productcatalog-web
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ProductCatalogDb;User Id=sa;Password=${SA_PASSWORD:-SqlServerDev123!};TrustServerCertificate=True;Encrypt=False
      PerformanceMonitoring__Enabled: ${PERFORMANCE_MONITORING__ENABLED:-true}
      PerformanceMonitoring__SlowQueryThresholdMs: ${PERFORMANCE_MONITORING__SLOWQUERYTHRESHOLDMS:-250}
      PerformanceMonitoring__NPlusOneDuplicateThreshold: ${PERFORMANCE_MONITORING__NPLUSONEDUPLICATETHRESHOLD:-3}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  sqlserver-data:
